body:
  text: 握竒經兵家類提要臣等謹案握竒經一作握機經一作幄機經舊本題風后撰漢丞相公孫宏解晉西平太守馬隆述讃案漢書藝文志兵家隂陽風后十三篇班固自注曰圖二卷依托也並無握竒經之名且十三篇七略著録固尚以為依托則此經此解七略不著録者其依托更不待辨矣馬隆述讃隋志亦不著録則亦猶公孫宏解也考唐獨孤及毗陵集有八陳圖記曰黃帝順煞氣以作兵法文昌以命將風后握機制勝作為陳圖故八其陳所以定位也衡抗於外軸布於內風雲附其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其旁所以致用也至若疑兵以固其餘地遊軍以案其後列門具將廢然後合戰弛張則二廣迭舉犄角則四竒皆出云云所説乃一一與此經合疑唐以來好事者因諸葛亮八陳之法推演為圖托之風后其後又因及此記推衍以為此經併取記中握機制勝之語以為之名宋史藝文志始著於録其晚出之顯證矣髙似孫子略曰馬隆本作幄機序曰幄者帳也大將所居言其事不可妄示人故云幄機則因握幄字近而附會其文今本多題曰握竒則又因經中有四為正四為竒餘竒為握竒之語改易其名也似孫又云總有三本一本三百六十字一本三百八十字蓋吕尚增字以發明之其一行間有公孫宏等語今本衍四字校驗此本分為三章正得三百八十四字蓋即似孫所謂衍四字本也經後原附續圖據書録解題亦稱馬隆所補然有目而無圖殆傳寫佚之歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
