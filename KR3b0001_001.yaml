  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0001_WYG_001-1a, image: WYG0726/WYG0726-0003a.png}
body:
  text: 握竒經漢公孫宏解晉馬隆述讃宋高似孫曰馬隆本作握機叙云風后軒轅臣也握者帳也大將所居言其事不可妄示人故云握機人稱諸子總有三本其一本三百六十字一本三百八十字蓋吕尚增字以發明之其一行簡有公孫𢎞等語或云武帝令霍光等習之於平樂館以輔少主備天下之不虞今本衍四字經曰八陳四為正四為竒舊注竒讀如字後人說天地風雲為四正龍虎鳥蛇為四奇公孫𢎞曰世有八卦陳法其既不用奇正似非風后所傳未可參用餘奇為握奇舊注奇讀如奇耦之奇解云說奇正者多矣而握奇云者四為正四為奇餘奇為握奇陳數有九中心奇零者大將握之以應赴八陳之急處或總稱之先出遊軍定兩端天有衝圓地有軸前後有衝一作有風雲風附於天雲附於地衝有重列各四隊前後之衝各三隊風居四維故以圓軸單列各三隊前後之衝各三隊風居四角故以方天居兩端地居中間總為八陳陳訖遊軍從後躡敵或驚其左或驚其右驚一作警聽音望麾以出四奇天地之前衝為虎翼風為蛇蟠圍繞之義也虎居於中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居其中張翼以進鳥掖兩端向敵而翔以應之虛實二壘一作三軍皆逐天文氣候向背山川利害隨時而行以正合以奇勝天地以下八重以列或曰握機望敵即引其後以掎角前列不動而前列先進以次之公孫𢎞曰傳項氏陳法依此今按而前列等八字舊文在依此注下誤也故遷次以成文或合而為一因離而為八各隨師之多少觸類而長天或圓而不動一作天或圓而不布前為左後為右天地四望之屬是也一本下有風象二字天居兩端其次風其次雲一作其次天衝其次地衝其次風衝其次雲衝左右相向是也地方布風雲各在後衝之前天居兩端其次地居中間一作其次地其次天中間兩地為北是也公孫𢎞曰北為地為從天陳變為地陳或即張弛布摯破敵攻圍不定其形故為動也一本自公孫𢎞曰動靜二義皆雜出經文中縱布天一一作兩天一無兩字而縱字上有雲象龍一句一作龍者象龍天二次之天二一作兩天縱布地四次於天後一作縱布四地四地次之一無下四地字縱布四風挾天地之左右一無地字天地前衝居其右六天後上𤣥下白七地前上𤣥下青一作赤八地後上黃下赤一作青陳勢八天地風雲飛龍翔鳥虎翼蛇蟠二革二金為天三革三金為地二革三金為風三革二金為雲四革三金為龍三革四金為虎四革五金為鳥五革四金為蛇舊注此八陳名用金鼓之制其金革之間加一角音者在天為兼風在地為兼雲在龍為兼鳥在虎為兼蛇加二角音者全師進東加三角音者全師進南一作西加四角音者全師進西一作南加五角音者全師進北鞉音不止者行伍不整金革既息而角音不止者師並旋三十二隊天衝十六隊風八隊天前衝十二隊地前衝十二隊地軸合作二十四隊八隊天後衝十二軸地後衝十六隊雲以天地前衝為虎翼天地後衝為飛龍風為蛇蟠雲為翔鳥八陳總述晉平虜護軍西平太守封奉高侯加授東羌挍尉馬隆述治兵以信求聖以奇信不可易戰無常規可握則握可施則施千變萬化敵莫能知匹陳讚動則為奇靜則為陳陳者陳列戰則不盡分苦均勞佚輪輒定有兵前守後隊勿進天陳讚天陳十六內方外圓四面風衝其形象天為陳之主為兵之先潛用三軍其形不偏地陳讚地陳十二其形正方雲生四角衝軸相當其體莫測動用無疆獨立不可配之於陽風陳讚風無正形附之於天變而為蛇其意漸𤣥風能鼓動萬物驚焉蛇能圍繞三軍懼焉雲陳讚自太公范蠡以來風雲無正形所以附天地下雲附於地則知無形變為翔鳥其狀乃成鳥能突擊雲能晦冥千變萬化金革之聲飛龍天地後衝龍變其中有手有足有背有胸潛則不測動則無窮陳形亦然象名其龍翔鳥鷙鳥擊搏必先翺翔勢凌霄漢飛禽伏藏審而下之下必有傷一夫突擊三軍莫當蛇蟠風為蛇蟠蛇吞天真勢欲圍繞性能屈伸四季之中與虎為鄰後變常山首尾相因虎翼天地前衝變為虎翼伏虎將搏盛其威力淮隂用之變化無極垓下之會魯公莫測奇兵讚古之奇兵兵在陳內今人奇兵兵在陳外兵體無形形露必潰審而為之百戰不昧合而為一離而為八合而為一平川如城散而為八逐地之形混混沌沌如環無窮紛紛紜紜莫知所終合則天居兩端地居其中散則一隂一陽兩兩相衝勿為事先動而輒從遊軍遊軍之形乍動乍靜避實擊虛視羸撓盛結陳趨地斷繞四徑後賢審之勢無常定金革金有五革有五退則聽金進則聽鼓鼓以增氣金以抑怒握其機關戰不失度鞉鼓紅塵戰深白刃相臨勝負未決人懷懼心乍奔乍背或縱或擒行伍交錯整在鞉音麾角麾法有五光目條流角音有五初驚末收麾者指揮角者驚覺臨機變化愼勿交錯光目一作光自兵體上兵伐謀有下用師棄本逐末聖人不為利物禁暴隨時禁衰蓋不得已聖人用之英雄為將夕惕乾乾舊闕四字其形不偏樂與身後勞與身先小人偏勝君子兩全爭者逆德不有破軍必有亡國握機為陳動則為賊後賢審之勿以為惑夫樂殺人者不得志於天下聖人之言以戒來者一作天下似孫曰風后握奇經三百八十四字其妙本乎奇正相生變化不測蓋潛乎伏羲氏之畫所謂天地風雲龍鳥蛇虎則其為八卦之象明矣蓋注奇讀如奇耦之奇則尤可與易凖諸儒多稱諸葛武侯八陳唐李衛公六花皆出乎此唐裴緒之論又以為六十四卦之變其出也無窮若此則所謂八陳者特八卦之統爾焦氏易學卦變至乎四千七十有六奇正相錯變化無窮是可以名數該之乎然觀太公武韜且言牧野之師有天陳有地陳此固出於握奇而又有人陳焉此又出於天地陳之外者非八陳六花所能盡也獨孤及作風后八陳圖記有曰黃帝順煞氣以作兵法文昌以命將風后握機制勝作為陳圖故八其陳所以定位衡抗於外軸布於內風雲負其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地遊軍以案其後列門具將發然後合戰弛張則二廣迭舉掎角則四奇皆出圖成樽俎帝用經略北逐獯鬻南平蚩尤遺風冥冥神機未昧項籍得之霸西楚黥布得之奄九江孝武得之攘胸奴唐天寶中客有得其遺制於黃帝書之外篇裂素而圖之按魚復之圖全本於握機賾其妙窮其神者武侯而已獨孤及以為項黥武帝得之未之思歟握奇經
